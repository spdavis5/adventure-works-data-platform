      - name: sub_total
        description: >
          Order subtotal before tax, shipping, and other adjustments.
      - name: tax_amt
        description: >
          Tax amount applied to the order.
      - name: territory_id
        description: >
          Identifier for the sales territory associated with the order.
      - name: total_due
        description: >
          Final amount due for the order after subtotal, tax, and freight are
          combined.

  - name: base_real_time__order_details
    description: >

  - name: base_ecom__email_campaigns
    description: >
      Each row represents one raw marketing event from the legacy e-commerce
      campaign feed. Grain: one row per event_id. This base model normalizes
      the raw JSON fields so the staging layer can deduplicate events across
      the legacy and newer marketing sources. Downstream: feeds into
      stg_ecom__email_campaigns.
    columns:
      - name: campaign_id
        description: >
          Campaign identifier from the raw source. Used to group events by
          marketing campaign.
      - name: event_id
        description: >
          Unique identifier for the marketing event. Primary key at the
          raw-event grain.
      - name: event_date
        description: >
          Timestamp when the marketing event occurred, parsed from the source
          event date string using the DD-Mon-YYYY HH12.MI AM format.
          Timezone is not explicitly converted in this base model.
      - name: event_type
        description: >
          Type of marketing event recorded in the source. Values include
          email_opened, add_to_cart, conversion, and email_clicked.
      - name: customer_id
        description: >
          Identifier of the customer associated with the marketing event.
          Used to connect campaign activity back to customer data.
      - name: order_id
        description: >
          Identifier of the order associated with the event when a purchase
          or conversion can be linked. Can be null.
      - name: product_id
        description: >
          Identifier of the product associated with the event when one is
          available. Can be null for events without a product.

  - name: base_ecom__email_mktg_new
    description: >
      Each row represents one raw marketing event from the newer e-commerce
      marketing feed. Grain: one row per event_id. This base model
      standardizes the newer feed (whitespace-trimmed campaign_id, lowercased
      event_type) so it can be unioned with the legacy campaign source and
      deduplicated downstream. Downstream: feeds into
      stg_ecom__email_campaigns.
    columns:
      - name: campaign_id
        description: >
          Campaign identifier from the raw source. Whitespace is removed in
          this base model so campaign values are easier to match across feeds.
      - name: event_id
        description: >
          Unique identifier for the marketing event. Primary key at the
          raw-event grain.
      - name: event_date
        description: >
          Timestamp when the marketing event occurred, parsed from the source
          event date string using the DD-Mon-YYYY HH12.MI AM format.
          Timezone is not explicitly converted in this base model.
      - name: event_type
        description: >
          Type of marketing event recorded in the source. Converted to
          lowercase for consistency with the legacy feed.
      - name: customer_id
        description: >
          Identifier of the customer associated with the marketing event.
          Used to connect campaign activity back to customer data.
      - name: order_id
        description: >
          Identifier of the order associated with the event when a purchase
          or conversion can be linked. Can be null.
      - name: product_id
        description: >
          Identifier of the product associated with the event when one is
          available. Can be null for events without a product.

  - name: base_ecom__sales_orders
    description: >
      Each row represents one raw sales order from the e-commerce batch
      source. Grain: one row per order. This base model converts the raw JSON
      payload into typed columns and preserves the nested order_details
      payload for downstream flattening. It is the source for
      stg_ecom__sales_orders (legacy feed half of the union).
    columns:
      - name: sales_order_id
        description: >
          Unique identifier for the sales order in the source system. Primary
          key at the order grain.
      - name: customer_id
        description: >
          Identifier of the customer who placed the order. Used to connect
          orders back to customer data.
      - name: account_number
        description: >
          Account number associated with the customer on the order. Alternate
          business identifier used by finance and support teams.
      - name: bill_to_address_id
        description: >
          Identifier for the billing address attached to the order.
      - name: comment
        description: >
          Free-text order comment from the source system. May be null.
      - name: credit_card_approval_code
        description: >
          Payment authorization code recorded for the order.
      - name: credit_card_id
        description: >
          Identifier for the stored credit card used on the order, when one
          exists.
      - name: currency_rate_id
        description: >
          Identifier for the exchange-rate record applied to the order, when
          one exists.
      - name: delivery_estimate
        description: >
          Free-text delivery estimate supplied by the source system. May
          describe days or weeks until delivery. Converted to
          delivery_estimate_days in the downstream staging model.
      - name: due_date
        description: >
          Date and time the order is due, as provided by the source system.
      - name: freight
        description: >
          Shipping and handling charge for the order.
      - name: modified_date
        description: >
          Timestamp when the order record was last modified in the source

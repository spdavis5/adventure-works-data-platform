      - name: currency_rate_id
        description: >
          Identifier for the exchange-rate record applied to the order, when
          one exists.
      - name: delivery_estimate
        description: >
          Delivery estimate text from the source system. In this feed it is
          currently null and reserved for compatibility with the legacy
          e-commerce order shape.
      - name: due_date
        description: >
          Date and time the order is due, as provided by the source system.
      - name: freight
        description: >
          Shipping and handling charge for the order.
      - name: modified_date
        description: >
          Timestamp when the order record was last modified in the source
          system.
      - name: online_order_flag
        description: >
          Flag indicating whether the order was placed online. A value of 1
          means online; 0 means non-online or manual entry.
      - name: order_date
        description: >
          Timestamp when the order was placed.
      - name: order_details
        description: >
          Placeholder field for the nested order detail payload. This base
          model keeps the column shape aligned with the combined staging
          model before the actual array is rebuilt downstream.
      - name: purchase_order_number
        description: >
          Purchase order number associated with the sales order, when present.
      - name: revision_number
        description: >
          Revision number for the order record in the source system.
      - name: sales_order_number
        description: >
          Human-readable order number from the source system.
      - name: sales_person_id
        description: >
          Identifier for the salesperson assigned to the order.
      - name: ship_date
        description: >
          Date and time the order was shipped, when available.
      - name: ship_method_id
        description: >
          Identifier for the shipping method selected for the order.
      - name: ship_to_address_id
        description: >
          Identifier for the shipping address attached to the order.
      - name: status
        description: >
          Current order status code from the source system. The numeric value
          indicates where the order sits in the fulfillment lifecycle.
      - name: sub_total
        description: >
          Order subtotal before tax, shipping, and other adjustments.
      - name: tax_amt
        description: >
          Tax amount applied to the order.
      - name: territory_id
        description: >
          Identifier for the sales territory associated with the order.
      - name: total_due
        description: >
          Final amount due for the order after subtotal, tax, and freight are
          combined.


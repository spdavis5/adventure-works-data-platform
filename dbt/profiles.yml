# =============================================================================
# dbt/profiles.yml - Snowflake Connection Profile
#
# Defines the "adventure-ops" profile that dbt uses to connect to Snowflake.
# All credentials are pulled from environment variables (never hardcoded).
# The target schema is dbt_dev, where all staging and intermediate models
# are built. This file is used both locally (with .env) and inside the
# dbt-mcp Docker container.
# =============================================================================
adventure-ops:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
      schema: dbt_dev
      threads: 4

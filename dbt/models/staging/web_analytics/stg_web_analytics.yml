version: 2

models:
  - name: stg_web_analytics
    description: "Staged web analytics events. Cleaned and type-cast for downstream joins."
    columns:
      - name: customer_id
        description: "Primary key for customers"
        data_tests:
          - not_null

      - name: product_id
        description: "Identifier for the product interacted with"
        data_tests:
          - not_null

      - name: session_id
        description: "Unique session identifier"
        data_tests:
          - not_null

      - name: event_timestamp
        description: "UTC timestamp of the interaction"
        data_tests:
          - not_null

      - name: page_url
        description: "The specific page visited"

      - name: event_type
        description: "Type of action (page_view, purchase, etc.)"

      - name: dbt_updated_at
        description: "The timestamp when this row was last updated by dbt"
